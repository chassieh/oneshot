server {
    listen 80;
    server_name shotatadeal.com www.shotatadeal.com 192.96.219.184 10.15.10.13;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        root /var/www/shotatadeal;
    }

    location /media/ {
        root /var/www/shotatadeal;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn/shotatadeal.sock;
    }
}
