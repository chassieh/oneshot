{% extends 'base.html' %}
{% block title %}Login - Shot at a Deal{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-4">Login</h2>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-semibold">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Login</button>
                    </form>
                    <p class="text-center mt-3 mb-0">No account? <a href="{% url 'accounts:register' %}">Sign up free</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
